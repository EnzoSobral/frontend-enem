<!DOCTYPE html>
<html>
  <head>
    <title>Cadastro ENEM</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Portal de inscrição ENEM</h1>
    </header>

    <div class="card">
      <h2>Cadastro</h2>

      <input type="text" id="nome" placeholder="Nome Completo" />
      <input type="email" id="emailCad" placeholder="E-mail" />
      <input type="text" placeholder="Telefone" />
      <input type="text" placeholder="Nome da Mãe" />
      <input type="text" placeholder="Nome do Pai" />
      <input type="text" placeholder="Endereço" />
      <input type="text" placeholder="Número" />
      <input type="text" placeholder="Cidade" />
      <input type="text" placeholder="Estado" />
      <input type="text" placeholder="País" />

      <select>
        <option>Já concluí</option>
        <option>Estou cursando</option>
      </select>

      <select>
        <option>Pública</option>
        <option>Privada</option>
      </select>

      <input type="password" id="senha" placeholder="Senha" />
      <p id="erroSenhaCad" class="erro"></p>

      <input type="password" id="confirmar" placeholder="Confirmar Senha" />
      <p id="erroConfirmar" class="erro"></p>

      <button onclick="salvar()">Salvar Inscrição</button>
      <button onclick="voltar()">Voltar</button>
    </div>

    <footer>© 2026 ENEM</footer>

    <script src="script.js"></script>
  </body>
</html>
