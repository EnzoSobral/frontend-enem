inscricao <!DOCTYPE html>
<html>
  <head>
    <title>Inscrição - Portal do Candidato</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <header class="header-fixo">
      <h1>Portal do Candidato - ENEM</h1>
      <nav>
        <a href="painel.html">Painel Principal</a>
        <a href="cursos.html">Verificação de Cursos</a>
        <a href="inscricao.html">Inscrição</a>
        <a href="index.html">Sair</a>
      </nav>
    </header>

    <div class="conteúdo">
      <div class="card">
        <h2>Inscrição na Prova</h2>

        <label>Língua Estrangeira</label>
        <select id="lingua">
          <option value="">Selecione</option>
          <option value="Inglês">Inglês</option>
          <option value="Espanhol">Espanhol</option>
        </select>
        <p id="erroLingua" class="erro"></p>

        <label>Estado</label>
        <select id="estado">
          <option value="">Selecione</option>
          <option value="SP">São Paulo</option>
          <option value="RJ">Rio de Janeiro</option>
          <option value="MG">Minas Gerais</option>
          <option value="RS">Rio Grande do Sul</option>
          <option value="BA">Bahia</option>
        </select>
        <p id="erroEstado" class="erro"></p>

        <label>Cidade</label>
        <select id="cidade">
          <option value="">Selecione</option>
          <option value="São Paulo">São Paulo</option>
          <option value="Campinas">Campinas</option>
          <option value="Rio de Janeiro">Rio de Janeiro</option>
          <option value="jaguariuna">jaguariuna</option>
          <option value="pedreira">Pedreira</option>
          <option value="amparo">Amparo</option>
          <option value="Serra negra">Serra negra</option>
        </select>
        <p id="erroCidade" class="erro"></p>

        <label>Necessita de atendimento especializado?</label>
        <select id="atendimento" onchange="toggleNecessidade()">
          <option value="">Selecione</option>
          <option value="nao">Não</option>
          <option value="sim">Sim</option>
        </select>
        <p id="erroAtendimento" class="erro"></p>

        <div id="campoNecessidade" style="display: none;">
      <label>Informe sua necessidade especializada</label>
      <input type="text" id="necessidade" placeholder="Ex: Prova em Braille, Intérprete de Libras..." />
       <p id="erroNecessidade" class="erro"></p>
        </div>

        <button onclick="confirmarInscricao()">Confirmar Inscrição</button>

   <p id="mensagemSucesso" class="sucesso"></p>
      </div>
    </div>

    <footer>© 2026 ENEM</footer>

    <script src="/script/inscricao.js"></script>
  </body>
</html>
